name: Deploy to apps.geddesworks.com/weddingpics

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /weddingpics/
          VITE_APPWRITE_ENDPOINT: https://sfo.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 69876eae003275d80ff8
          VITE_APPWRITE_BUCKET_ID: wedding-photos

      - name: Deploy to hub repo
        env:
          TOKEN: ${{ secrets.APPS_DEPLOY_TOKEN }}
        run: |
          git clone \
            --branch main \
            --single-branch \
            --depth 1 \
            https://x-access-token:${TOKEN}@github.com/GeddesWorks/geddesworks-apps.git \
            _hub

          rm -rf _hub/weddingpics
          mkdir -p _hub/weddingpics
          cp -r dist/. _hub/weddingpics/

          cd _hub
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weddingpics/
          git diff --cached --quiet && echo "Nothing to deploy" && exit 0
          git commit -m "deploy(weddingpics): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
